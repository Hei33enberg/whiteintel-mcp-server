# Smithery deployment config — https://smithery.ai
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      whiteintelApiKey:
        type: string
        description: "Optional wi_ API key (whiteintel.dev → Settings → API keys). Forwarded as a Bearer token to authenticate as your plan and lift free-tier limits. Omit to use the anonymous free tier."
      whiteintelApiBase:
        type: string
        description: "API origin (defaults to https://whiteintel.dev; SSRF-guarded)."
    required: []
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['index.js'],
      env: {
        ...(config.whiteintelApiKey ? { WHITEINTEL_API_KEY: config.whiteintelApiKey } : {}),
        ...(config.whiteintelApiBase ? { WHITEINTEL_API_BASE: config.whiteintelApiBase } : {})
      }
    })
